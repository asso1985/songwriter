name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm turbo run check-types

      - name: Run tests
        run: pnpm turbo run test
        env:
          LLM_PROVIDER: mock

      - name: Build
        run: pnpm turbo run build

      - name: Install Playwright browsers
        run: pnpm --filter @songwriter/web exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm --filter @songwriter/web exec playwright test
        env:
          LLM_PROVIDER: mock
